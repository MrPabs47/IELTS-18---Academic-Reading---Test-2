name: Expand Part 2 Matching Feedback

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/expand-part2-matching-feedback.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/test3-study-task-feedback
          persist-credentials: true
      - name: Improve Questions 14 to 19 feedback depth
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('academic/shared/reading-feature-shell.js')
          source = path.read_text(encoding='utf-8')
          replacements = {
              '14: ["Paragraph D explains why hunters could leave arrows and broken bows in the mountains.", "Matching information", "Hunters would have easily misplaced arrows and they often discarded broken bows rather than take them all the way home"]': '14: ["The statement refers to two linked details: arrows being lost and broken bows being left behind. Paragraph D says hunters could ‘easily misplace arrows’ and ‘often discarded broken bows’ rather than carry them home. Both details appear together there, so the answer is D.", "Matching two linked details to the paragraph that contains both", "Hunters would have easily misplaced arrows and they often discarded broken bows rather than take them all the way home"]',
              '15: ["Paragraph C describes hiking with equipment and camping on permafrost.", "Matching information", "Fieldwork is hard work – hiking with all our equipment, often camping on permafrost"]': '15: ["The statement asks where the writer describes the practical difficulty of archaeological work. Paragraph C mentions hiking with all the equipment and camping on permafrost. These are the specific working conditions referred to in the question, so the answer is C.", "Locating a paragraph that describes practical fieldwork conditions", "Fieldwork is hard work – hiking with all our equipment, often camping on permafrost"]',
              '16: ["Paragraph F links low temperatures with crop failures and greater reliance on hunting.", "Matching cause and effect", "supplement failing agricultural harvests in times of low temperatures"]': '16: ["The question focuses on hunting becoming more important when farming was less reliable. Paragraph F says hunting helped ‘supplement failing agricultural harvests in times of low temperatures’. This directly matches the cause-and-effect relationship in the statement, so choose F.", "Matching a cause-and-effect relationship across paraphrased wording", "supplement failing agricultural harvests in times of low temperatures"]',
              '17: ["Paragraph H says future archaeologists could extract artefacts from retreating ice.", "Finding a future possibility", "archaeologists could be extracting some of those artefacts from retreating ice in years to come"]': '17: ["The key phrase is the future possibility of finding artefacts as the ice retreats. Paragraph H says archaeologists ‘could be extracting’ artefacts from retreating ice ‘in years to come’. The modal could and the time phrase both signal the prediction, so the answer is H.", "Identifying a future prediction signalled by modal language", "archaeologists could be extracting some of those artefacts from retreating ice in years to come"]',
              '18: ["Paragraph G names hides and antlers as goods linked to trade demand.", "Identifying examples", "a booming demand for hides to fight off the cold, as well as antlers"]': '18: ["The statement asks where particular products became valuable because of market demand. Paragraph G gives the examples of hides and antlers, describing a ‘booming demand’ for them. Those named examples match the question exactly, so the answer is G.", "Finding named examples that support an economic demand claim", "a booming demand for hides to fight off the cold, as well as antlers"]',
              '19: ["Paragraph B says glacial archaeologists need to race the clock.", "Matching a paraphrase", "glacial archaeologists need to race the clock"]': '19: ["The question refers to researchers working quickly because their evidence is disappearing. Paragraph B says glacial archaeologists need to ‘race the clock’ as the ice melts. This figurative expression matches the urgency in the statement, so the answer is B.", "Recognising a figurative phrase and its paraphrased meaning", "glacial archaeologists need to race the clock"]',
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit('Expected feedback entry was not found.')
              source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
          PY
          node --check academic/shared/reading-feature-shell.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academic/shared/reading-feature-shell.js
          git commit -m "Expand feedback depth for Test 3 Questions 14 to 19"
          git push
