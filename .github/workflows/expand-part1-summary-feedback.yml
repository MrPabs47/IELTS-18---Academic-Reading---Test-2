name: Expand Part 1 Summary Feedback

on:
  push:
    branches:
      - feature/test3-study-task-feedback
    paths:
      - .github/workflows/expand-part1-summary-feedback.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/test3-study-task-feedback
          persist-credentials: true
      - name: Improve Questions 6 to 13 feedback depth
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('academic/shared/reading-feature-shell.js')
          source = path.read_text(encoding='utf-8')
          replacements = {
              '6: ["Warships were directly described as lightweight.", "Locating an exact word", "Warships were built to be lightweight"]': '6: ["The summary needs an adjective describing how warships were designed. The passage states that \"Warships were built to be lightweight and very speedy\", so lightweight is the exact one-word answer. Do not replace it with a synonym such as light.", "Using summary grammar to locate an exact descriptive word", "Warships were built to be lightweight"]',
              '7: ["The battering ram was made of bronze.", "Locating an exact word", "They had a bronze battering ram"]': '7: ["The phrase \"a ___ battering ram\" needs a material. The passage explicitly says \"They had a bronze battering ram\", which gives the exact one-word answer. This is a direct detail, so you do not need to infer or paraphrase it.", "Using the noun phrase around a gap to predict word class", "They had a bronze battering ram"]',
              '8: ["The trireme had rowers in top, middle, and lower levels.", "Using a summary clue", "rowers in the top, middle and lower levels"]': '8: ["The summary gives a three-part list: top, middle and ___. In the passage, the trireme had rowers in the \"top, middle and lower levels\". The final position in that parallel list is lower, so copy that word exactly.", "Matching a summary list to a parallel list in the passage", "rowers in the top, middle and lower levels"]',
              '9: ["Merchant ships had a wider hull.", "Using surrounding grammar", "They had a wider hull"]': '9: ["The phrase \"a ___ hull\" needs a comparative adjective because merchant ships are being contrasted with warships. The passage says that merchant ships \"had a wider hull\". Wider is the required form; wide would not fit the comparison.", "Using comparison grammar to select the exact word form", "They had a wider hull"]',
              '10: ["Merchant ships had square sails and a small triangular sail.", "Scanning for a contrast", "large square sails and a small triangular sail"]': '10: ["The summary contrasts large square sails with one small sail of a different shape. The passage gives \"large square sails and a small triangular sail\". Because the gap describes the sail’s shape, triangular is correct; triangle is a noun, not the required adjective.", "Identifying the exact adjective required by summary grammar", "large square sails and a small triangular sail"]',
              '11: ["Music helped the rowers keep time together.", "Finding a stated detail", "music would be played on an instrument, and oars would then keep time with this"]': '11: ["The question asks what helped the rowers work in time. The passage says that music was played on an instrument and that the oars kept time with this. Therefore music is the one-word answer, even though instrument appears nearby.", "Tracing a pronoun reference to the key summary idea", "music would be played on an instrument, and oars would then keep time with this"]',
              '12: ["Grain is the agricultural product named in the passage.", "Selecting a category example", "agricultural products (e.g. grain from Egypt’s Nile valley)"]': '12: ["The summary asks for an example of an agricultural product. The passage gives \"grain from Egypt’s Nile valley\" as that example. Grain is the exact answer; adding Egypt or Nile valley would exceed the one-word limit.", "Selecting a named example while respecting the word limit", "agricultural products (e.g. grain from Egypt’s Nile valley)"]',
              '13: ["Towboats dragged large merchant ships to the quay.", "Matching a paraphrase", "a number of towboats that would drag them to the quay"]': '13: ["The summary asks what dragged the large merchant ships to the quay. The passage says that \"a number of towboats\" would drag them there. Towboats is correct, and the plural form matters because the passage refers to more than one boat.", "Matching a paraphrased action to the exact passage noun", "a number of towboats that would drag them to the quay"]',
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f'Expected feedback entry was not found: {old[:60]}')
              source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
          PY
          python -m pytest tests/reading_feature_shell_study_chrome_test.py
          git rm .github/workflows/expand-part1-summary-feedback.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academic/shared/reading-feature-shell.js
          git commit -m "Expand feedback depth for Test 3 Questions 6 to 13"
          git push
