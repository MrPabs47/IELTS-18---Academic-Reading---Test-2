<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IELTS Pabs Reading Hub</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-soft: #f2f5fb;
      --text: #111827;
      --text-soft: #5b6474;
      --accent: #0057b8;
      --accent-soft: #e8f1ff;
      --gt: #2e7d32;
      --gt-soft: #e8f6ea;
      --border: #d9dfeb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --success: #1b5e20;
      --muted: #8a93a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 220px);
      color: var(--text);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .hero,
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 18px;
    }

    .hero h1 { margin: 0 0 10px; font-size: clamp(1.9rem, 4vw, 2.6rem); }
    .hero p { margin: 0; color: var(--text-soft); line-height: 1.6; }

    .section h2 {
      margin: 0;
      font-size: clamp(1.35rem, 2.8vw, 1.65rem);
    }

    .section-subtitle {
      margin: 10px 0 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .screen {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .22s ease, transform .22s ease;
    }

    .screen[hidden] {
      display: none;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .type-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: var(--panel);
      cursor: pointer;
      text-align: left;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .type-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .type-card h3 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .type-card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .type-card.academic {
      border-color: #b7d3ff;
      background: linear-gradient(140deg, #f5f9ff 0%, #edf4ff 100%);
    }

    .type-card.academic h3 { color: #0b4a9b; }

    .type-card.general {
      border-color: #b8e0bb;
      background: linear-gradient(140deg, #f5fcf5 0%, #ecf8ed 100%);
    }

    .type-card.general h3 { color: #25692a; }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .back-btn {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .tests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .test-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: var(--panel);
    }

    .test-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .test-label {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #eaf7ec;
      color: var(--success);
      white-space: nowrap;
    }

    .test-title {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.35;
    }

    .test-meta {
      margin: 0 0 10px;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      width: 100%;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 700;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
      background: #fafcff;
    }

    @media (max-width: 720px) {
      .page { padding: 20px 14px 36px; }
      .hero, .section { padding: 18px; }
      .type-grid { grid-template-columns: 1fr; }
      .top-actions { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>IELTS Pabs Reading Hub</h1>
      <p>Pick your reading type first, then open a full practice test in one tap.</p>
    </section>

    <section id="typeScreen" class="section screen">
      <h2>What are we practising today?</h2>
      <p class="section-subtitle">Choose your IELTS reading test type to continue.</p>
      <div class="type-grid">
        <button class="type-card academic" type="button" onclick="chooseType('academic')">
          <h3>Academic</h3>
          <p>For university-focused IELTS Reading practice.</p>
        </button>
        <button class="type-card general" type="button" onclick="chooseType('general-training')">
          <h3>General Training</h3>
          <p>For everyday and workplace reading tasks.</p>
        </button>
      </div>
    </section>

    <section id="testsScreen" class="section screen" hidden>
      <div class="top-actions">
        <button class="back-btn" type="button" onclick="goBackToTypeSelection()">← Back</button>
        <div>
          <h2 id="testsHeading">Reading Tests</h2>
          <p id="testsSubtitle" class="section-subtitle"></p>
        </div>
      </div>
      <div class="tests-grid" id="testsGrid"></div>
    </section>
  </div>

  <script>
    const testTypes = [
      { id: 'academic', label: 'Academic' },
      { id: 'general-training', label: 'General Training' }
    ];

    const tests = [
      {
        type: 'academic',
        title: 'Cambridge 16 Test 2',
        subtitle: 'Academic Reading',
        href: './academic/cambridge-16/test-2/IELTS16%20Test%202%20-%20Academic%20Reading.html',
        note: 'Master HTML file'
      },
      {
        type: 'academic',
        title: 'Cambridge 18 Test 2',
        subtitle: 'Academic Reading',
        href: './academic/cambridge-18/test-2/IELTS18%20Test%202%20-%20Academic%20Reading.html',
        note: 'Master HTML file'
      },
      {
        type: 'general-training',
        title: 'Cambridge 19 Test 2',
        subtitle: 'General Training Reading',
        href: './general-training/cambridge-19/test-2/IELTS19%20Test%202%20-%20Reading%20-%20GT.html',
        note: 'Master HTML file'
      },
      {
        type: 'general-training',
        title: 'Cambridge 19 Test 3',
        subtitle: 'General Training Reading',
        href: './general-training/cambridge-19/test-3/IELTS19%20Test%203%20-%20Reading%20-%20GT.html',
        note: 'Master HTML file'
      }
    ];

    let currentScreen = 'type-selection';
    let activeType = null;

    function screenCopy(typeId) {
      const selected = testTypes.find((t) => t.id === typeId);
      const label = selected ? selected.label : 'Reading';
      return {
        heading: `${label} Reading Tests`,
        subtitle: `Choose a ${label.toLowerCase()} test to start your practice.`
      };
    }

    function renderTests() {
      const grid = document.getElementById('testsGrid');
      grid.innerHTML = '';

      const filtered = tests.filter((test) => test.type === activeType);
      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No tests available for this type yet.</div>';
        return;
      }

      filtered.forEach((test) => {
        const card = document.createElement('article');
        card.className = 'test-card';
        card.innerHTML = `
          <div class="test-top">
            <h3 class="test-title">${test.title}</h3>
            <span class="test-label">Available</span>
          </div>
          <p class="test-meta"><strong>${test.subtitle}</strong><br>${test.note}</p>
          <a class="open-btn" href="${test.href}">Open test</a>
        `;
        grid.appendChild(card);
      });
    }

    function setScreen(screen, { pushHash = true } = {}) {
      currentScreen = screen;

      const typeScreen = document.getElementById('typeScreen');
      const testsScreen = document.getElementById('testsScreen');

      if (screen === 'type-selection') {
        typeScreen.hidden = false;
        testsScreen.hidden = true;
        if (pushHash) history.replaceState(null, '', window.location.pathname + window.location.search);
        return;
      }

      typeScreen.hidden = true;
      testsScreen.hidden = false;

      const copy = screenCopy(activeType);
      document.getElementById('testsHeading').textContent = copy.heading;
      document.getElementById('testsSubtitle').textContent = copy.subtitle;
      renderTests();

      if (pushHash && activeType) history.replaceState(null, '', `#${activeType}`);
    }

    function chooseType(typeId) {
      activeType = typeId;
      setScreen('test-selection');
    }

    function goBackToTypeSelection() {
      activeType = null;
      setScreen('type-selection');
    }

    function initFromHash() {
      const hash = window.location.hash.replace('#', '');
      const valid = testTypes.some((t) => t.id === hash);
      if (valid) {
        activeType = hash;
        setScreen('test-selection', { pushHash: false });
      } else {
        setScreen('type-selection', { pushHash: false });
      }
    }

    window.addEventListener('hashchange', initFromHash);
    initFromHash();
  </script>
</body>
</html>
